<!DOCTYPE html>
<html lang="en">
<head>
  <title>Buttons</title>
</head>
<body>
  <button class="js-heads" onclick="clickbuttons('Heads');">Heads</button>
  <button class="js-tails" onclick="clickbuttons('Tails');">Tails</button>

  <p class="js-choice">You Choose:</p>

  <script>

    function clickbuttons(button){
      if(button === 'Heads'){
      const choice = document.querySelector('.js-heads').innerHTML

      console.log(choice);

      document.querySelector('.js-choice').innerHTML = `You Choose: ${choice}`
      }else{
      const choice = document.querySelector('.js-tails').innerHTML

      console.log(choice);

      document.querySelector('.js-choice').innerHTML = `You Choose: ${choice}`
      }
    }
  </script>
</body>
</html>
