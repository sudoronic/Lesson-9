<!DOCTYPE html>
<html lang="en">
<head>
  <title>Name Displaying</title>
</head>
<body>
  <p><b>Display Your Name</b></p>
  <input class="js-name" placeholder="Enter Your Name Here" onkeydown="checkEnterKey();">
  
  <button class="button1" onclick="takesName();">Submit</button>

  <p class="js-display-name"></p>
  
  <script>
    function checkEnterKey(){
      if(event.key === 'Enter'){
        takesName();
        return;
      }
    }
    function takesName(){
     const userName = document.querySelector('.js-name').value;
    
     document.querySelector('.js-display-name').innerHTML = `Your Name is ${userName}`;
    }
  </script>
</body>
</html>
